<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ResizeHub - A fast, secure, and modern client-side image resizer. Resize your images instantly in your browser.">
    <title>ResizeHub | Modern Image Resizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <h1><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> ResizeHub</h1>
        </div>
    </header>

    <main class="container">
        <div id="error-alert" class="alert hidden" role="alert"></div>

        <section id="upload-section" class="upload-container glass-panel">
            <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Upload an image">
                <div class="upload-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <h2>Drag & Drop your image here</h2>
                <p>or</p>
                <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp" hidden>
                <button id="browse-btn" class="btn btn-primary">Select Image</button>
                <p class="file-hints">Supports JPG, PNG, WEBP</p>
            </div>
        </section>

        <section id="editor-section" class="editor-container hidden">
            <div class="editor-grid">
                <div class="preview-panel glass-panel">
                    <div id="loading-spinner" class="spinner-container hidden">
                        <div class="spinner"></div>
                    </div>
                    <div class="image-wrapper">
                        <img id="image-preview" src="" alt="Image preview">
                    </div>
                    <div class="image-stats">
                        <p>Original: <span id="original-dimensions">0 x 0</span> px</p>
                    </div>
                </div>

                <div class="controls-panel glass-panel">
                    <h3>Resize Settings</h3>
                    
                    <div class="control-group">
                        <label for="input-width">Width (px)</label>
                        <input type="number" id="input-width" min="1" placeholder="e.g. 1920">
                    </div>

                    <div class="aspect-ratio-toggle">
                        <button id="lock-ratio-btn" class="btn-icon active" aria-label="Toggle Aspect Ratio" title="Lock Aspect Ratio">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                        <small>Lock Aspect Ratio</small>
                    </div>

                    <div class="control-group">
                        <label for="input-height">Height (px)</label>
                        <input type="number" id="input-height" min="1" placeholder="e.g. 1080">
                    </div>

                    <div class="divider"></div>

                    <div class="control-group">
                        <label for="input-percentage">Scale (%)</label>
                        <input type="number" id="input-percentage" min="1" max="500" value="100">
                    </div>

                    <div class="control-group">
                        <label for="output-format">Export Format</label>
                        <select id="output-format">
                            <option value="image/jpeg">JPG</option>
                            <option value="image/png">PNG</option>
                            <option value="image/webp">WEBP</option>
                        </select>
                    </div>

                    <div class="action-buttons">
                        <button id="reset-btn" class="btn btn-secondary">Reset</button>
                        <button id="download-btn" class="btn btn-success">Download</button>
                    </div>
                    <button id="new-image-btn" class="btn btn-text">Upload New Image</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
